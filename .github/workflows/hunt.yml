name: Lead Factory Master Pipeline

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  factory-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth python-docx jinja2 requests
          playwright install chromium

      - name: Phase 1 The Hunt
        env:
          SEARCH_QUERY: "HR Consultancy in Kolkata"
        run: python scraper.py

      - name: Phase 2 The Architect
        run: python architect.py

      - name: Phase 3 The Messenger
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python messenger.py

      - name: Commit History Updates
        run: |
          git config --global user.name "LeadBot-Master"
          git config --global user.email "bot@github.com"
          git add history.txt
          git commit -m "chore: sync history [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Demos to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './demos'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Daily Data Backup
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f leads.csv ]; then
            curl -s -F chat_id=$TG_CHAT_ID \
                 -F document=@leads.csv \
                 -F caption="Master Leads Backup" \
                 https://api.telegram.org/bot$TG_BOT_TOKEN/sendDocument
          fi
