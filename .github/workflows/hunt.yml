name: Lead Hunter Bot

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  run-hunter:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for committing history
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Hunter
        env:
          SEARCH_QUERY: "HR Consultancy in Kolkata"
        run: python scraper.py

      - name: Commit History
        run: |
          git config --global user.name "LeadBot-DevOps"
          git config --global user.email "bot@github.com"
          git add history.txt
          git commit -m "chore: update leads history [skip ci]" || echo "No changes to commit"
          git push

      - name: Send Report & CSV to Telegram
        if: always()
        run: |
          # 1. Send the Word Doc Report (Reasons/Audit)
          if [ -f status_report.docx ]; then
            curl -s -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
                 -F document=@status_report.docx \
                 -F caption="📄 Daily Audit Report (Reasons)" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          fi
          
          sleep 2

          # 2. Send the Excel CSV (Pure Data for your Lead List)
          if [ -f leads.csv ]; then
            curl -s -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
                 -F document=@leads.csv \
                 -F caption="📊 Leads Excel (Ready for Phase 2)" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument
          fi

          sleep 2

          # 3. Send the Debug Screenshot
          if [ -f debug_view.png ]; then
            curl -s -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
                 -F photo=@debug_view.png \
                 -F caption="📸 Browser View" \
                 https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendPhoto
          fi
